                        <h3><a href="detail.html?id=1">关于改善村道照明的建议</a></h3>

                    <div class="opinion-footer">

                </div>

                    <div class="opinion-header">
                        <h3><a href="detail.html?id=2">希望加强农村垃圾处理</a></h3>

                    </div>
                    <div class="opinion-footer">
                        <span class="category">环境</span>
                        <span class="status pending">未回复</span>
